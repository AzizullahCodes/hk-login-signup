<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up page</title>
    <!-- fontawesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">

</head>
<body>
  
     <div class="login-container">
        <div class="login-form">
            <h2>SIGN UP</h2>
            
            <div class="input-group">
                <div class="icon-box"><i class="fa-regular fa-address-card"></i></div>
                <input type="text" placeholder="Name"  id="name">
            </div>
<div class="input-group">
                <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
                <input type="email" placeholder="Email"  id="email">
            </div>

            <div class="input-group">
                <div class="icon-box"><i class="fa-solid fa-lock"></i></div>
                <input type="password" placeholder="Password"  id="password">
            </div>

            <div class="input-group">
                <div class="icon-box"><i class="fa-solid fa-lock"></i></div>
                <input type="password" placeholder="Confirm Password"  id="confirmPassword">
            </div>

            <button type="submit" class="login-btn" id="btn">SING UP</button>

            <p class="signup-text">Already have an accont? <a href="./signIn.html">Sign In now</a></p>
            <!-- <a href="./signIn.html"></a> -->
             <!-- <a href="./signIn.html"></a> -->
        </div>
    </div>




    <script src="app.js"></script>
</body>
</html>
